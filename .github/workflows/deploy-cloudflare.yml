# Build the Nuxt app with the Cloudflare Pages preset and deploy the output
# via wrangler-action. Triggers:
#   - push to main (normal deploys)
#   - workflow_dispatch (manual re-deploy button)
#   - repository_dispatch type 'sanity-publish' (POST from Sanity webhook)
#
# Required secrets (GitHub → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Pages:Edit scope (Cloudflare Dashboard → My Profile → API Tokens)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare Dashboard → Workers & Pages → right sidebar
#   SANITY_PROJECT_ID      — Sanity project ID (used at build time to fetch blog slugs)
#   SANITY_DATASET         — Usually 'production'
#   GOOGLE_PLACES_API_KEY  — Google Cloud Console, Places API (New) enabled
#   GOOGLE_PLACE_ID        — Already in use on EC2
#
# Sanity webhook setup (Sanity Studio → API → Webhooks):
#   URL:     https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#   Method:  POST
#   Headers: Authorization: Bearer <github-fine-grained-PAT>
#            Accept:        application/vnd.github+json
#   Body:    {"event_type":"sanity-publish"}
#   PAT scopes: contents:write, actions:write (fine-grained, this repo only)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-publish]

concurrency:
  group: deploy-cloudflare
  # Queue back-to-back Sanity webhook builds so we don't drop publishes
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
      SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
      NUXT_PUBLIC_SITE_URL: https://silkride.co.uk
      NITRO_PRESET: cloudflare-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Cloudflare Pages preset)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=silk-ride --branch=main
